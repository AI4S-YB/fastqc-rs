# Publishes conda packages to the `ai4s-yb` channel on prefix.dev via OIDC
# (trusted publisher). No API key is stored in the repo; prefix.dev verifies
# the GitHub OIDC token.
#
# One-time setup on prefix.dev:
#   https://prefix.dev/channels/ai4s-yb/settings/trusted-publishers
#   - Owner: AI4S-YB
#   - Repository: fastqc-rs
#   - Workflow filename: conda-publish.yml

name: Conda Publish

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  id-token: write   # required for OIDC trusted publishing
  contents: read

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: linux-64,   os: ubuntu-latest }
          - { target: osx-arm64,  os: macos-14 }
          # osx-64: dropped — macos-13 runners often queue for hours and
          # Apple Silicon covers modern mac users anyway.
          # win-64: needs MSVC activation for zstd-sys/cc; re-enable once
          # the recipe has proper stdlib("c") + activation wired up.

    steps:
      - uses: actions/checkout@v4

      - name: Build conda package
        uses: prefix-dev/rattler-build-action@v0.2.34
        with:
          recipe-path: recipe/recipe.yaml
          # Include the ai4s-yb channel so `--skip-existing=all` can check
          # if this variant already exists upstream and skip the build
          # (avoids re-uploading the same filename with different bytes).
          build-args: >-
            --target-platform=${{ matrix.target }}
            -c conda-forge
            -c https://prefix.dev/ai4s-yb
            --skip-existing=all

      - name: Upload to prefix.dev (trusted publisher)
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          # macOS runners ship bash 3.2 which lacks `shopt -s globstar`,
          # so use `find` for cross-platform directory traversal.
          # If the build was skipped (package already exists), there are
          # no *.conda files under output/ and this loop simply does nothing.
          find output -name "*.conda" -print 2>/dev/null | while IFS= read -r file; do
            echo "Uploading $file"
            rattler-build upload prefix -c ai4s-yb "$file"
          done
